<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTab Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg mesh"></div>
    <main class="app-shell">
      <aside class="left-nav glass">
        <h1>MyTab</h1>
        <button class="menu-btn active" data-page="homePage">首页</button>
        <button class="menu-btn" data-page="hotPage">热榜</button>
        <button id="toggleEdit" class="btn ghost">进入编辑模式</button>
      </aside>

      <section class="main-area">
        <section id="homePage" class="page active">
          <header class="hero glass">
            <div>
              <h2 id="clock" class="clock"></h2>
              <p id="today" class="today"></p>
            </div>
          </header>

          <article class="glass panel">
            <div class="panel-head"><h3>快捷入口</h3><button id="resetLinks" class="btn ghost edit-only hidden">重置</button></div>
            <form id="linkForm" class="row-form edit-only hidden">
              <input id="linkTitle" maxlength="20" required placeholder="名称" />
              <input id="linkUrl" type="url" required placeholder="https://example.com" />
              <input id="linkIcon" maxlength="2" placeholder="图标" />
              <button class="btn primary" type="submit">新增</button>
            </form>
            <div id="linkGrid" class="link-grid"></div>
          </article>

          <section class="home-widgets">
            <article class="glass panel">
              <div class="panel-head"><h3>倒数日</h3></div>
              <form id="countdownForm" class="row-form edit-only hidden">
                <input id="countdownTitle" maxlength="30" required placeholder="目标名称" />
                <input id="countdownDate" type="date" required />
                <button class="btn primary" type="submit">保存</button>
              </form>
              <div id="countdownResult" class="countdown-value">暂无倒数日</div>
            </article>

            <article class="glass panel">
              <div class="panel-head"><h3>待办事项</h3></div>
              <form id="todoForm" class="row-form edit-only hidden">
                <input id="todoInput" maxlength="80" required placeholder="添加一条待办" />
                <button class="btn primary" type="submit">添加</button>
              </form>
              <ul id="todoList" class="todo-list"></ul>
            </article>
          </section>
        </section>

        <section id="hotPage" class="page">
          <article class="glass panel">
            <div class="panel-head">
              <h3>热点聚合卡片墙</h3>
              <div class="actions">
                <button id="refreshHot" class="btn primary">刷新全部</button>
                <button id="toggleConfig" class="btn ghost">源配置</button>
              </div>
            </div>
            <p class="panel-tip">优先展示缓存，后台刷新；每个源最多显示 20 条。</p>
            <div id="hotCards" class="hot-cards"></div>
          </article>

          <article id="sourceConfig" class="glass panel hidden">
            <div class="panel-head"><h3>数据源配置</h3></div>
            <p class="panel-tip">✅ 启用/停用 · ☰ 拖拽排序（从上到下）</p>
            <ul id="sourceConfigList" class="source-config-list"></ul>
          </article>
        </section>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <label><input type="checkbox" /><span></span></label>
        <button class="btn danger" type="button">删除</button>
      </li>
    </template>

    <template id="linkCardTemplate">
      <div class="link-card-wrap">
        <a class="link-card" target="_blank" rel="noreferrer noopener">
          <span class="link-badge"></span>
          <span class="link-title"></span>
        </a>
        <button class="btn danger link-delete edit-only hidden" type="button">删除</button>
      </div>
    </template>

    <script type="module" src="newtab.js"></script>
  </body>
</html>
